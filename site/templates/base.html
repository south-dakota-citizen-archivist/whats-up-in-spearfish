<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}What's up in Spearfish?{% endblock %}</title>
  <link rel="alternate" type="application/rss+xml" title="What's up in Spearfish? — Events" href="/feed.xml">
  <style>{{ inline_css | safe }}</style>
  {% block extra_head %}{% endblock %}
</head>
<body class="h-full flex flex-col bg-gray-100 text-gray-900">

  <header class="bg-white border-b border-gray-200 shadow-sm sticky top-0 z-40">
    <!-- Brand bar -->
    <div class="max-w-screen-xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex items-center justify-between h-13">
        <a href="/" class="text-lg font-bold text-gray-900 hover:text-blue-700 transition-colors tracking-tight">
          What's up in Spearfish?
        </a>
        <div class="flex items-center gap-2">
          <a href="/feed.xml" title="RSS feed"
             class="inline-flex items-center gap-1 px-2.5 py-1.5 rounded-md text-orange-700 bg-orange-100 hover:bg-orange-200 transition-colors text-xs font-semibold border border-orange-200">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" viewBox="0 0 24 24" fill="currentColor">
              <path d="M6.18 15.64a2.18 2.18 0 0 1 2.18 2.18C8.36 19.01 7.38 20 6.18 20C4.98 20 4 19.01 4 17.82a2.18 2.18 0 0 1 2.18-2.18M4 4.44A15.56 15.56 0 0 1 19.56 20h-2.83A12.73 12.73 0 0 0 4 7.27V4.44m0 5.66a9.9 9.9 0 0 1 9.9 9.9h-2.83A7.07 7.07 0 0 0 4 12.93V10.1z"/>
            </svg>
            RSS
          </a>
          <a href="/calendar.ics" title="Subscribe to iCalendar"
             class="inline-flex items-center gap-1 px-2.5 py-1.5 rounded-md bg-blue-100 text-blue-800 hover:bg-blue-200 transition-colors text-xs font-semibold border border-blue-200">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
            </svg>
            iCal
          </a>
        </div>
      </div>
    </div>
    <!-- Section pill strip -->
    {% block subnav %}{% endblock %}
  </header>

  <main class="flex-1 w-full">
    {% block content %}{% endblock %}
  </main>

  <footer class="bg-white border-t border-gray-300 mt-auto">
    <div class="max-w-screen-xl mx-auto px-4 sm:px-6 lg:px-8 py-5 text-xs text-gray-600">
      <p>🤖 <a href="https://github.com/south-dakota-citizen-archivist/whats-up-in-spearfish" class="hover:underline">Vibe-coded with Claude</a></p>
    </div>
  </footer>

  {% block extra_scripts %}{% endblock %}
</body>
</html>
